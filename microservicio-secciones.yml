server:
  port: 9091
spring:
  application:
    name: microservicio-secciones
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/residencia_noticias?useSSL=false&serverTimezone=UTC
    username: root
    password:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: disabled
      password: disabled
eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    org.springframework: INFO
    com.zaxxer.hikari: INFO

jwt:
  secret: aauca-noticias-secret-key-minimo-32-caracteres-2026
  expiration: 86400000