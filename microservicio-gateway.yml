server:
  port: 8081

spring:
  application:
    name: microservicio-gateway
  cloud:
    gateway:
      routes:
        - id: microservicio-users
          uri: http://localhost:9090
          predicates:
            - Path=/api/user/**, /api/solicitudes/**, /api/backup/**
        - id: microservicio-secciones
          uri: http://localhost:9091
          predicates:
            - Path=/api/seccion/**
        - id: microservicio-noticias
          uri: http://localhost:9092
          predicates:
            - Path=/api/noticia/**, /api/lectura/**, /api/destinatario/**, /uploads/**

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: aauca-noticias-secret-key-minimo-32-caracteres-2026

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.microservicio.gateway: DEBUG