server:
  port: 8081

spring:
  application:
    name: microservicio-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        # ── Usuarios (9090) ───────────────────────────────────────────────────
        - id: microservicio-users
          uri: http://localhost:9090
          predicates:
            - Path=/api/user/**, /api/solicitudes/**

        # ── Secciones (9091) ──────────────────────────────────────────────────
        - id: microservicio-secciones
          uri: http://localhost:9091
          predicates:
            - Path=/api/seccion/**

        # ── Noticias (9092) ───────────────────────────────────────────────────
        - id: microservicio-noticias
          uri: http://localhost:9092
          predicates:
            - Path=/api/noticia/**, /api/lectura/**, /api/destinatario/**

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG